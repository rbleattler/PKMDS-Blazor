name: UAT — Close Preview Environments

on:
  # Always runs when a PR targeting main is closed, regardless of which files changed.
  # Intentionally has no paths-ignore — environment cleanup must happen unconditionally.
  pull_request:
    branches: [main]
    types: [closed]

  # Weekly sweep: catches any environments that slipped through (e.g. workflow failures,
  # PRs closed while only ignored-path files changed before the split-workflow fix).
  schedule:
    - cron: '0 3 * * 0'   # 03:00 UTC every Sunday

  # Manual trigger for on-demand cleanup (e.g. when the staging-environment limit is hit).
  workflow_dispatch:

jobs:
  # ── Close the environment for the PR that just closed ────────────────────────
  close_pr_staging:
    name: Close UAT for PR ${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          deployment_environment: ${{ github.event.pull_request.number }}

  # ── Sweep: report stale environments (schedule / manual dispatch) ────────────
  # NOTE: Azure/static-web-apps-deploy action: close requires the GitHub PR event
  # payload to supply the internal pull_request ID that Azure's API demands.
  # That payload only exists when the workflow is triggered by a pull_request event
  # (handled above by close_pr_staging). Running close from schedule/workflow_dispatch
  # always fails with "Request is missing the pull request id." regardless of whether
  # deployment_environment or repo_token are provided — it is a known limitation of
  # the action. Stale environments that accumulate despite close_pr_staging must be
  # removed manually from the Azure portal:
  #   Azure Portal → Static Web Apps → <app> → Environments → delete pr-NNN
  report_stale:
    name: Report recently-closed PRs (manual cleanup may be needed)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: List closed PRs that may have stale environments
        uses: actions/github-script@v8
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              per_page: 100,
            });
            const cutoff = new Date(Date.now() - 60 * 24 * 60 * 60 * 1000);
            const recent = prs
              .filter(pr => new Date(pr.closed_at) > cutoff)
              .map(pr => pr.number);
            if (recent.length === 0) {
              console.log('No recently-closed PRs found.');
            } else {
              console.log(`Recently-closed PRs (check Azure portal for stale environments): ${recent.join(', ')}`);
              console.log('If the staging-environment limit is hit, delete pr-NNN environments manually in the Azure portal.');
            }
