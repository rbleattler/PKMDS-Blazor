name: UAT Deploy (Azure Static Web Apps)

on:
  pull_request:
    branches: [main]
    # 'closed' is intentionally omitted here — closing is handled by uat-close.yml,
    # which has no paths-ignore so it always runs regardless of which files changed.
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - "**.ps1"
      - ".editorconfig"
      - "TestFiles/**"
      - "Pkmds.Tests/**"
      - "tools/**"
      - "**/*.gitignore"
      - "**/*.gitattributes"
      - "**/*.yml"
      - "**/*.DotSettings.user"
      - "*.slnx"

jobs:
  build_and_deploy:
    name: Build and Deploy UAT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: ./global.json

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore Pkmds.Web/Pkmds.Web.csproj

      - name: Publish
        run: dotnet publish Pkmds.Web/Pkmds.Web.csproj -c Release -o release --nologo -p:BlazorWebAssemblyEnvironment=Staging

      - name: Copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Update cache version
        uses: datamonsters/replace-action@v2
        with:
          files: 'release/wwwroot/service-worker.published.js'
          replacements: '%%CACHE_VERSION%%=${{ github.run_id }}'

      - name: Set Function App URL
        env:
          FUNCTION_APP_URL: ${{ secrets.FUNCTION_APP_URL }}
        run: |
          if [ -z "${FUNCTION_APP_URL}" ]; then
            echo "::error::FUNCTION_APP_URL secret is empty or not set"
            exit 1
          fi
          sed -i "s|%%FUNCTION_APP_URL%%|${FUNCTION_APP_URL}|g" release/wwwroot/appsettings.json
          echo "appsettings.json after replacement:"
          cat release/wwwroot/appsettings.json
          if grep -q '%%FUNCTION_APP_URL%%' release/wwwroot/appsettings.json; then
            echo "::error::Placeholder %%FUNCTION_APP_URL%% was not replaced — check that the FUNCTION_APP_URL secret is set to the actual Azure Functions URL, not the placeholder itself"
            exit 1
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: release/wwwroot
          skip_app_build: true

  deploy_functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: ./global.json

      - name: Publish Functions
        run: dotnet publish Pkmds.Functions/Pkmds.Functions.csproj -c Release -o functions-publish --nologo

      - name: Zip publish output
        run: cd functions-publish && zip -r ../functions.zip .

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --name pkmds-functions \
            --resource-group pkmds-bug-reports \
            --src functions.zip

